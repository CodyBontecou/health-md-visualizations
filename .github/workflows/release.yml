name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag/ref to build, attest, and publish"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Validate version metadata
        run: |
          set -euo pipefail
          manifest_version="$(node -p "require('./manifest.json').version")"
          package_version="$(node -p "require('./package.json').version")"
          min_app_version="$(node -p "require('./manifest.json').minAppVersion")"
          versions_min_app="$(node -p "require('./versions.json')[require('./manifest.json').version]")"
          tag_version="${RELEASE_REF#v}"

          if [ "$manifest_version" != "$package_version" ]; then
            echo "manifest.json version ($manifest_version) does not match package.json ($package_version)" >&2
            exit 1
          fi

          if [ "$versions_min_app" != "$min_app_version" ]; then
            echo "versions.json entry for $manifest_version ($versions_min_app) does not match manifest minAppVersion ($min_app_version)" >&2
            exit 1
          fi

          if [ "$tag_version" != "$manifest_version" ]; then
            echo "Release tag ($RELEASE_REF) must match manifest/package version ($manifest_version)" >&2
            exit 1
          fi

      - name: Stage supported release assets
        run: |
          set -euo pipefail
          rm -rf dist/obsidian-release
          mkdir -p dist/obsidian-release
          cp main.js manifest.json dist/obsidian-release/
          if [ -f styles.css ]; then
            cp styles.css dist/obsidian-release/styles.css
          fi
          find dist/obsidian-release -maxdepth 1 -type f -print | sort

      - name: Generate artifact attestations
        uses: actions/attest@v4
        with:
          subject-path: "${{ github.workspace }}/dist/obsidian-release/*"

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_REF" >/dev/null 2>&1; then
            while IFS= read -r asset; do
              case "$asset" in
                main.js|manifest.json|styles.css) ;;
                *) gh release delete-asset "$RELEASE_REF" "$asset" --yes ;;
              esac
            done < <(gh release view "$RELEASE_REF" --json assets --jq '.assets[].name')
            gh release upload "$RELEASE_REF" dist/obsidian-release/* --clobber
          else
            gh release create "$RELEASE_REF" dist/obsidian-release/* \
              --title "$RELEASE_REF" \
              --notes "Health.md Visualizations ${RELEASE_REF#v}"
          fi
